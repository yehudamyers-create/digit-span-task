<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sequential Digit Span</title>
<link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet">
<script src="https://unpkg.com/jspsych@7.3.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.0"></script>
<style>
body { 
  background: #f4f6fb; 
  font-family: Arial, sans-serif; 
  margin: 0;
  padding: 0;
}
.center { 
  text-align: center; 
  font-size: 48px; 
  font-weight: 600; 
}
.small { 
  font-size: 22px; 
}
input { 
  font-size: 28px; 
  width: 220px; 
  text-align: center; 
  padding: 8px; 
}
button { 
  font-size: 22px; 
  padding: 8px 16px; 
  cursor: pointer; 
}
.digit {
  animation: fadeInOut 0.8s ease-in-out;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: scale(0.8); }
  20% { opacity: 1; transform: scale(1); }
  80% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.8); }
}
.final-screen {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 60px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.score-box {
  background: white;
  color: #333;
  padding: 40px 60px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin: 20px;
}
.close-instruction {
  background: rgba(255,255,255,0.2);
  padding: 20px 30px;
  border-radius: 10px;
  margin-top: 30px;
  font-size: 20px;
  border: 2px solid rgba(255,255,255,0.3);
}
</style>
</head>
<body></body>
<script>
const jsPsych = initJsPsych({ override_safe_mode: true });
let digitLength = 3;
let failures = 0;
let maxSpan = 0;
const ceiling = 20;
let currentSeq = "";
let digitIndex = 0;
let practiceCorrect = false;

function makeDigits(n) {
    let s = "";
    for (let i = 0; i < n; i++) {
        s += Math.floor(Math.random() * 10);
    }
    return s;
}

function recallTrial() {
    return {
        type: jsPsychSurveyHtmlForm,
        html: `
            <div class="center small">
            Type the numbers you just saw:<br><br>
            <input name="resp" pattern="[0-9]*" inputmode="numeric" id="recall-input"><br><br>
            <button type="submit">Continue</button>
            </div>
        `,
        on_load: function() {
            document.getElementById('recall-input').focus();
        },
        on_finish: data => {
            const response = data.response?.resp?.trim() || "";
            if (response === currentSeq) {
                digitLength++;
                failures = 0;
                maxSpan = digitLength - 1;
            } else {
                failures++;
                if (digitLength - 1 > maxSpan) {
                    maxSpan = digitLength - 1;
                }
            }
        }
    };
}

// Instructions screen
const instructions = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
        <div class="center small" style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
            <h2>Digit Span Test Instructions</h2>
            <p style="text-align: left; line-height: 1.6;">
                In this test, you will see a sequence of digits appear one at a time on the screen.
            </p>
            <p style="text-align: left; line-height: 1.6;">
                <strong>Your task:</strong> Remember the digits in the order they appeared, 
                then type them back.
            </p>
            <p style="text-align: left; line-height: 1.6;">
                The sequences will get longer as you go. The test ends after you make 2 mistakes.
            </p>
            <p style="margin-top: 40px; font-size: 18px;">
                <strong>Let's start with a practice round.</strong>
            </p>
            <p style="color: #666;">Press any key to begin the practice</p>
        </div>
    `
};

// Practice trial
const practiceTimeline = {
    timeline: [
        {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="center small">Practice Round - Get ready...</div>`,
            on_start: () => {
                currentSeq = makeDigits(2); // Practice with 2 digits
                digitIndex = 0;
            },
            choices: "NO_KEYS",
            trial_duration: 1000
        },
        {
            timeline: [{
                type: jsPsychHtmlKeyboardResponse,
                stimulus: () => {
                    const digit = currentSeq[digitIndex];
                    digitIndex++;
                    return `<div class="center digit">${digit}</div>`;
                },
                choices: "NO_KEYS",
                trial_duration: 800
            }],
            loop_function: () => digitIndex < currentSeq.length
        },
        {
            type: jsPsychSurveyHtmlForm,
            html: `
                <div class="center small">
                <strong>Practice:</strong> Type the numbers you just saw:<br><br>
                <input name="resp" pattern="[0-9]*" inputmode="numeric" id="practice-input"><br><br>
                <button type="submit">Continue</button>
                </div>
            `,
            on_load: function() {
                document.getElementById('practice-input').focus();
            },
            on_finish: data => {
                const response = data.response?.resp?.trim() || "";
                practiceCorrect = (response === currentSeq);
            }
        },
        {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: () => {
                if (practiceCorrect) {
                    return `
                        <div class="center small" style="color: #4CAF50;">
                            <h3>✓ Correct!</h3>
                            <p>You remembered: <strong>${currentSeq}</strong></p>
                            <p style="margin-top: 30px;">Great! Now let's begin the actual test.</p>
                            <p style="color: #666; margin-top: 20px;">Press any key to start</p>
                        </div>
                    `;
                } else {
                    return `
                        <div class="center small" style="color: #ff6b6b;">
                            <h3>Not quite right</h3>
                            <p>The correct sequence was: <strong>${currentSeq}</strong></p>
                            <p style="margin-top: 30px;">That's okay! Remember to type the digits in the order you saw them.</p>
                            <p style="margin-top: 20px;">Let's begin the actual test.</p>
                            <p style="color: #666; margin-top: 20px;">Press any key to start</p>
                        </div>
                    `;
                }
            },
            trial_duration: null
        }
    ]
};

const loopTimeline = {
    timeline: [
        {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: () => {
                currentSeq = makeDigits(digitLength);
                digitIndex = 0;
                return `<div class="center small">Get ready...</div>`;
            },
            choices: "NO_KEYS",
            trial_duration: 1000
        },
        {
            timeline: [{
                type: jsPsychHtmlKeyboardResponse,
                stimulus: () => {
                    const digit = currentSeq[digitIndex];
                    digitIndex++;
                    return `<div class="center digit">${digit}</div>`;
                },
                choices: "NO_KEYS",
                trial_duration: 800
            }],
            loop_function: () => digitIndex < currentSeq.length
        },
        recallTrial()
    ],
    loop_function: () => {
        return !(failures >= 2 || digitLength > ceiling);
    }
};

const endScreen = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: () => {
        return `
            <div class="final-screen">
                <div class="score-box">
                    <h2 style="margin-top: 0; font-size: 32px;">Test Complete!</h2>
                    <p style="font-size: 20px; color: #666;">Your score:</p>
                    <div style="font-size: 80px; font-weight: bold; color: #667eea; margin: 20px 0;">
                        ${maxSpan}
                    </div>
                    <p style="font-size: 24px; color: #ff6b6b; font-weight: 600; margin-top: 30px;">
                        ⚠️ Please remember your score!
                    </p>
                    <p style="font-size: 18px; color: #666;">
                        You will be asked to enter it in the survey.
                    </p>
                </div>
                <div class="close-instruction">
                    <p style="margin: 0; font-size: 24px; font-weight: 600;">
                        Close this window to continue the survey
                    </p>
                </div>
            </div>
        `;
    },
    choices: "NO_KEYS"
};

jsPsych.run([instructions, practiceTimeline, loopTimeline, endScreen]);
</script>
</body>
</html>
