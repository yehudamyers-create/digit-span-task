<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sequential Digit Span</title>
<link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet">
<script src="https://unpkg.com/jspsych@7.3.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.0"></script>
<style>
body { 
  background: #f4f6fb; 
  font-family: Arial, sans-serif; 
  margin: 0;
  padding: 0;
}
.center { 
  text-align: center; 
  font-size: 48px; 
  font-weight: 600; 
}
.small { 
  font-size: 22px; 
}
input { 
  font-size: 28px; 
  width: 220px; 
  text-align: center; 
  padding: 8px; 
}
button { 
  font-size: 22px; 
  padding: 8px 16px; 
  cursor: pointer; 
}
.digit {
  animation: fadeInOut 0.8s ease-in-out;
}
@keyframes fadeInOut {
  0% { opacity: 0; transform: scale(0.8); }
  20% { opacity: 1; transform: scale(1); }
  80% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.8); }
}
.final-screen {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 60px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.score-box {
  background: white;
  color: #333;
  padding: 40px 60px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin: 20px;
}
.close-instruction {
  background: rgba(255,255,255,0.2);
  padding: 20px 30px;
  border-radius: 10px;
  margin-top: 30px;
  font-size: 20px;
  border: 2px solid rgba(255,255,255,0.3);
}
</style>
</head>
<body></body>
<script>
const jsPsych = initJsPsych({ override_safe_mode: true });
let digitLength = 3;
let failures = 0;
let maxSpan = 0;
const ceiling = 20;
let currentSeq = "";
let digitIndex = 0;

function makeDigits(n) {
    let s = "";
    for (let i = 0; i < n; i++) {
        s += Math.floor(Math.random() * 10);
    }
    return s;
}

function recallTrial() {
    return {
        type: jsPsychSurveyHtmlForm,
        html: `
            <div class="center small">
            Type the numbers you just saw:<br><br>
            <input name="resp" pattern="[0-9]*" inputmode="numeric" id="recall-input"><br><br>
            <button type="submit">Continue</button>
            </div>
        `,
        on_load: function() {
            document.getElementById('recall-input').focus();
        },
        on_finish: data => {
            const response = data.response?.resp?.trim() || "";
            if (response === currentSeq) {
                digitLength++;
                failures = 0;
                maxSpan = digitLength - 1;
            } else {
                failures++;
                if (digitLength - 1 > maxSpan) {
                    maxSpan = digitLength - 1;
                }
            }
        }
    };
}

const loopTimeline = {
    timeline: [
        {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: () => {
                currentSeq = makeDigits(digitLength);
                digitIndex = 0;
                return `<div class="center small">Get ready...</div>`;
            },
            choices: "NO_KEYS",
            trial_duration: 1000
        },
        {
            timeline: [{
                type: jsPsychHtmlKeyboardResponse,
                stimulus: () => {
                    const digit = currentSeq[digitIndex];
                    digitIndex++;
                    return `<div class="center digit">${digit}</div>`;
                },
                choices: "NO_KEYS",
                trial_duration: 800
            }],
            loop_function: () => digitIndex < currentSeq.length
        },
        recallTrial()
    ],
    loop_function: () => {
        return !(failures >= 2 || digitLength > ceiling);
    }
};

const endScreen = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: () => {
        return `
            <div class="final-screen">
                <div class="score-box">
                    <h2 style="margin-top: 0; font-size: 32px;">Test Complete!</h2>
                    <p style="font-size: 20px; color: #666;">Your Maximum Digit Span:</p>
                    <div style="font-size: 72px; font-weight: bold; color: #667eea; margin: 20px 0;">
                        ${maxSpan}
                    </div>
                </div>
                <div class="close-instruction">
                    <p style="margin: 0; font-size: 24px; font-weight: 600;">
                        ✓ Please close this window to continue the survey
                    </p>
                </div>
            </div>
        `;
    },
    choices: "NO_KEYS"
};

jsPsych.run([loopTimeline, endScreen]);
</script>
</body>
</html>
