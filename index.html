<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Operation Span Test</title>
<link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet">
<script src="https://unpkg.com/jspsych@7.3.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.0"></script>
<style>
body { 
  background: #f4f6fb; 
  font-family: Arial, sans-serif; 
  margin: 0;
  padding: 0;
}
.center { 
  text-align: center; 
  font-size: 48px; 
  font-weight: 600; 
}
.math-problem {
  font-size: 36px;
  font-weight: 600;
  text-align: center;
  margin: 40px 0;
}
.symbol-display {
  font-size: 120px;
  font-weight: bold;
  text-align: center;
  color: #667eea;
  animation: fadeIn 0.3s ease-in;
  font-family: 'Arial', sans-serif;
}
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
.symbol-grid {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  gap: 12px;
  justify-content: center;
  margin: 10px auto;
}
.symbol-button {
  width: 100px;
  height: 100px;
  font-size: 48px;
  font-weight: bold;
  border: 3px solid #667eea;
  background: white;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.symbol-button:hover {
  background: #667eea;
  color: white;
  transform: scale(1.05);
}
.symbol-button.selected {
  background: #667eea;
  color: white;
}
.instructions {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px 20px;
  line-height: 1.8;
  font-size: 18px;
}
.button-large {
  font-size: 22px;
  padding: 15px 40px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px 10px;
}
.button-large:hover {
  background: #5568d3;
}
.jspsych-btn {
  font-size: 24px !important;
  padding: 20px 50px !important;
  margin: 15px !important;
  border-radius: 10px !important;
  font-weight: 600 !important;
  min-width: 160px !important;
  cursor: pointer !important;
  transition: all 0.2s !important;
  border: 2px solid #667eea !important;
  background: white !important;
  color: #667eea !important;
}
.jspsych-btn:hover {
  background: #667eea !important;
  color: white !important;
  transform: scale(1.05) !important;
  box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3) !important;
}
.jspsych-btn:active {
  transform: scale(0.98) !important;
}
.jspsych-content {
  max-width: 95% !important;
  margin: auto !important;
}
#jspsych-html-button-response-btngroup {
  display: flex !important;
  justify-content: center !important;
  gap: 20px !important;
  margin-top: 20px !important;
  flex-wrap: wrap !important;
}
.final-screen {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.score-box {
  background: white;
  color: #333;
  padding: 25px 40px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin: 10px;
}
.recall-container {
  padding: 10px 20px;
}
.recall-container h3 {
  margin-top: 5px;
  margin-bottom: 10px;
}
</style>
</head>
<body></body>
<script>
const jsPsych = initJsPsych({ override_safe_mode: true });

// Variables
let prolificID = "";
let ospanScore = 0;
let mathAccuracy = 0;
let totalMathTrials = 0;
let correctMathTrials = 0;
let currentSetSymbols = [];
let selectedSymbols = [];
let allSymbolsUsed = [];

// Check if Prolific ID is in URL parameter
const urlParams = new URLSearchParams(window.location.search);
const urlProlificID = urlParams.get('pid');

// Klingon-style symbols (12 distinct symbols using Unicode characters and special glyphs)
// These are visually distinct abstract symbols
const SYMBOLS = [
  '▲', // Triangle up
  '◆', // Diamond
  '●', // Circle filled
  '■', // Square filled
  '★', // Star filled
  '◄', // Triangle left
  '►', // Triangle right
  '▼', // Triangle down
  '◇', // Diamond outline
  '○', // Circle outline
  '□', // Square outline
  '☆'  // Star outline
];

// Generate math problems (Unsworth et al. 2005 specifications)
// Format: (A op B) op C = Result?
// Results always 0-25, no negatives at ANY step
function generateMathProblem() {
  const operations = [
    { op: '+', fn: (a, b) => a + b },
    { op: '-', fn: (a, b) => a - b },
    { op: '×', fn: (a, b) => a * b },
    { op: '÷', fn: (a, b) => a / b }
  ];
  
  let correctAnswer;
  let problem;
  let attempts = 0;
  
  // Keep generating until we get a valid problem (no negatives at any step, result 0-25, integer)
  do {
    attempts++;
    if (attempts > 100) {
      // Fallback to simple addition if we can't generate a valid problem
      const a = Math.floor(Math.random() * 10) + 1;
      const b = Math.floor(Math.random() * 10) + 1;
      const c = Math.floor(Math.random() * 5) + 1;
      correctAnswer = a + b + c;
      if (correctAnswer > 25) correctAnswer = 15;
      problem = `(${a} + ${b}) + ${c}`;
      break;
    }
    
    const op1 = operations[Math.floor(Math.random() * operations.length)];
    const op2 = operations[Math.floor(Math.random() * 3)]; // +, -, or ×
    
    let a = Math.floor(Math.random() * 9) + 1; // 1-9
    let b = Math.floor(Math.random() * 9) + 1; // 1-9
    let c = Math.floor(Math.random() * 9) + 1; // 1-9
    
    // For division, ensure it divides evenly
    if (op1.op === '÷') {
      b = Math.floor(Math.random() * 3) + 1; // 1-3 for cleaner division
      a = b * (Math.floor(Math.random() * 5) + 1); // Ensure even division
    }
    
    // For subtraction in first operation, ensure a >= b (no negative intermediate)
    if (op1.op === '-' && a < b) {
      [a, b] = [b, a]; // Swap so larger - smaller
    }
    
    const intermediate = op1.fn(a, b);
    
    // Skip if intermediate is negative or not an integer
    if (intermediate < 0 || !Number.isInteger(intermediate)) continue;
    
    // For subtraction in second operation, ensure intermediate >= c (no negative result)
    if (op2.op === '-' && intermediate < c) continue;
    
    correctAnswer = op2.fn(intermediate, c);
    
    // Check if valid (0-25, integer, non-negative)
    if (correctAnswer >= 0 && correctAnswer <= 25 && Number.isInteger(correctAnswer)) {
      problem = `(${a} ${op1.op} ${b}) ${op2.op} ${c}`;
      break;
    }
  } while (true);
  
  // 50% show correct, 50% show incorrect (off by ±1 to ±3)
  const showCorrect = Math.random() > 0.5;
  const offset = (Math.floor(Math.random() * 3) + 1) * (Math.random() > 0.5 ? 1 : -1);
  let displayedAnswer = showCorrect ? correctAnswer : correctAnswer + offset;
  
  // Ensure displayed answer is also 0-25
  if (displayedAnswer < 0) displayedAnswer = correctAnswer + Math.abs(offset);
  if (displayedAnswer > 25) displayedAnswer = correctAnswer - Math.abs(offset);
  
  return {
    problem: `${problem} = ${displayedAnswer}?`,
    correct: showCorrect
  };
}

// Get random symbol not used recently
function getRandomSymbol() {
  let symbol;
  let attempts = 0;
  do {
    symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
    attempts++;
  } while (allSymbolsUsed.includes(symbol) && attempts < 20);
  
  allSymbolsUsed.push(symbol);
  if (allSymbolsUsed.length > 8) allSymbolsUsed.shift();
  
  return symbol;
}

// Helper function to enable Enter key for button clicks
function enableEnterKey(buttonIndex = 0) {
  setTimeout(() => {
    const buttons = document.querySelectorAll('.jspsych-btn');
    if (buttons.length > 0) {
      const handler = (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          buttons[buttonIndex].click();
        }
      };
      document.addEventListener('keydown', handler);
      document._enterHandler = handler;
    }
  }, 100);
}

// Helper to remove Enter key handler
function removeEnterKey() {
  if (document._enterHandler) {
    document.removeEventListener('keydown', document._enterHandler);
    document._enterHandler = null;
  }
}

// Prolific ID entry - ALWAYS require manual entry for validation
const prolificEntry = {
  type: jsPsychSurveyHtmlForm,
  html: `
    <div class="instructions">
      <h2 style="text-align: center;">Welcome to the Operation Span Test</h2>
      <p style="text-align: center;">Please enter your Prolific ID:</p>
      <div style="text-align: center;">
        <input name="prolific_id" 
               id="prolific-id-input" 
               type="text" 
               required
               placeholder="Enter Prolific ID"
               style="font-size: 24px; width: 100%; max-width: 300px; padding: 12px; text-align: center; border: 2px solid #667eea; border-radius: 8px;">
      </div>
      <p style="text-align: center; color: #666; font-size: 14px; margin-top: 10px;">Please enter the same ID you used in the survey</p>
    </div>
  `,
  button_label: 'Continue',
  on_load: function() {
    const input = document.getElementById('prolific-id-input');
    input.focus();
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.querySelector('#jspsych-survey-html-form-next').click();
      }
    });
  },
  on_finish: data => {
    prolificID = data.response?.prolific_id?.trim() || "";
  }
};

// Instructions
const instructions = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="instructions">
      <h2 style="text-align: center;">Operation Span Test Instructions</h2>
      <p>In this test, you will do two things at the same time:</p>
      <ol style="text-align: left;">
        <li><strong>Solve math problems</strong> - Decide if the equation shown is true or false (you have 5 seconds per problem)</li>
        <li><strong>Remember symbols</strong> - After each math problem, a symbol will appear. Remember it!</li>
      </ol>
      <p>After a series of math problems and symbols, you will be asked to recall all the symbols <strong>in the order they appeared</strong>.</p>
      <p style="background: #fff3cd; padding: 15px; border-radius: 8px; border-left: 4px solid #ffc107;">
        <strong>Important:</strong> You must try your best on the math problems! Your math accuracy must be at least 85% for your data to be valid.
      </p>
      <p style="text-align: center; margin-top: 30px;">Let's start with a quick practice round.</p>
      <p style="text-align: center; color: #999; font-size: 14px;">(Press Enter or click the button below)</p>
    </div>
  `,
  choices: ['Begin Practice'],
  on_load: () => {
    enableEnterKey(0);
  },
  on_finish: () => {
    removeEnterKey();
  }
};

// Create practice trial (1 combined practice set, length 3)
function createPracticeSet() {
  const setSize = 3;
  const setSymbols = [];
  const trials = [];
  
  for (let i = 0; i < setSize; i++) {
    // Math problem with 4-second time limit
    const mathProb = generateMathProblem();
    trials.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: `<div class="math-problem">${mathProb.problem}</div>`,
      choices: ['True', 'False'],
      trial_duration: 5000, // 5-second limit
      on_load: () => {
        document.addEventListener('keydown', function trueKeyHandler(e) {
          if (e.key === 'Enter' || e.key === 't' || e.key === 'T') {
            e.preventDefault();
            document.querySelectorAll('.jspsych-btn')[0].click();
            document.removeEventListener('keydown', trueKeyHandler);
          } else if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            document.querySelectorAll('.jspsych-btn')[1].click();
            document.removeEventListener('keydown', trueKeyHandler);
          }
        });
      },
      on_finish: data => {
        totalMathTrials++;
        if (data.response === null) {
          data.timeout = true;
        } else {
          const correct = (data.response === 0 && mathProb.correct) || (data.response === 1 && !mathProb.correct);
          if (correct) correctMathTrials++;
        }
      }
    });
    
    // Symbol
    const symbol = getRandomSymbol();
    setSymbols.push(symbol);
    trials.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="symbol-display">${symbol}</div>`,
      choices: "NO_KEYS",
      trial_duration: 800
    });
  }
  
  // Recall with feedback
  trials.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="recall-container">
        <h3 style="text-align: center;">Recall the symbols in order</h3>
        <p style="text-align: center;">Click the symbols in the order they appeared:</p>
        <div id="selected-display" style="font-size: 48px; min-height: 60px; margin: 10px 0; color: #667eea; font-weight: bold; text-align: center;"></div>
        <div class="symbol-grid">
          ${SYMBOLS.map(s => `<button class="symbol-button" onclick="selectSymbol('${s}')">${s}</button>`).join('')}
        </div>
        <div style="text-align: center; margin-top: 5px;">
          <button class="button-large" onclick="clearSymbols()">Clear</button>
        </div>
        <p style="text-align: center; color: #999; font-size: 14px; margin-top: 10px;">(Press Enter to submit)</p>
      </div>
    `,
    choices: ['Submit'],
    on_load: () => {
      selectedSymbols = [];
      window.selectSymbol = (symbol) => {
        selectedSymbols.push(symbol);
        document.getElementById('selected-display').textContent = selectedSymbols.join(' ');
      };
      window.clearSymbols = () => {
        selectedSymbols = [];
        document.getElementById('selected-display').textContent = '';
      };
      enableEnterKey(0);
    },
    on_finish: (data) => {
      removeEnterKey();
      data.correct_symbols = setSymbols;
      data.recalled_symbols = selectedSymbols;
      const correct = JSON.stringify(setSymbols) === JSON.stringify(selectedSymbols);
      data.recall_correct = correct;
    }
  });
  
  // Feedback
  trials.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: () => {
      const lastTrial = jsPsych.data.get().last(1).values()[0];
      const correct = lastTrial.recall_correct;
      const correctSeq = lastTrial.correct_symbols.join(' ');
      const yourSeq = lastTrial.recalled_symbols.join(' ');
      
      if (correct) {
        return `
          <div class="instructions" style="text-align: center;">
            <h3 style="color: #4CAF50;">✓ Correct!</h3>
            <p style="font-size: 32px;">${correctSeq}</p>
            <p style="margin-top: 30px;">Great! Now let's begin the actual test.</p>
            <p style="color: #999;">In the real test, you won't get feedback.</p>
            <p style="text-align: center; color: #999; font-size: 14px; margin-top: 15px;">(Press Enter to continue)</p>
          </div>
        `;
      } else {
        return `
          <div class="instructions" style="text-align: center;">
            <h3 style="color: #ff6b6b;">Not quite</h3>
            <p>Correct sequence: <span style="font-size: 32px;">${correctSeq}</span></p>
            <p>You entered: <span style="font-size: 32px;">${yourSeq || '(nothing)'}</span></p>
            <p style="margin-top: 30px;">Remember to click the symbols in the exact order they appeared.</p>
            <p style="color: #999;">Let's begin the actual test now.</p>
            <p style="text-align: center; color: #999; font-size: 14px; margin-top: 15px;">(Press Enter to continue)</p>
          </div>
        `;
      }
    },
    choices: ['Start Main Test'],
    on_load: () => {
      enableEnterKey(0);
    },
    on_finish: () => {
      removeEnterKey();
    }
  });
  
  return trials;
}

// Create main OSPAN set
function createMainSet(setSize) {
  const setSymbols = [];
  const trials = [];
  
  for (let i = 0; i < setSize; i++) {
    // Math problem with 4-second time limit
    const mathProb = generateMathProblem();
    trials.push({
      type: jsPsychHtmlButtonResponse,
      stimulus: `<div class="math-problem">${mathProb.problem}</div>`,
      choices: ['True', 'False'],
      trial_duration: 5000, // 5-second limit
      on_load: () => {
        document.addEventListener('keydown', function mathKeyHandler(e) {
          if (e.key === 'Enter' || e.key === 't' || e.key === 'T') {
            e.preventDefault();
            document.querySelectorAll('.jspsych-btn')[0].click();
            document.removeEventListener('keydown', mathKeyHandler);
          } else if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            document.querySelectorAll('.jspsych-btn')[1].click();
            document.removeEventListener('keydown', mathKeyHandler);
          }
        });
      },
      on_finish: data => {
        totalMathTrials++;
        if (data.response === null) {
          data.timeout = true;
        } else {
          const correct = (data.response === 0 && mathProb.correct) || (data.response === 1 && !mathProb.correct);
          if (correct) correctMathTrials++;
        }
      }
    });
    
    // Brief blank
    trials.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: "NO_KEYS",
      trial_duration: 200
    });
    
    // Symbol
    const symbol = getRandomSymbol();
    setSymbols.push(symbol);
    trials.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<div class="symbol-display">${symbol}</div>`,
      choices: "NO_KEYS",
      trial_duration: 800
    });
    
    // Brief blank
    trials.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '',
      choices: "NO_KEYS",
      trial_duration: 200
    });
  }
  
  // Recall (no feedback in main task)
  trials.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="recall-container">
        <h3 style="text-align: center;">Recall the symbols in order</h3>
        <div id="selected-display" style="font-size: 48px; min-height: 60px; margin: 10px 0; color: #667eea; font-weight: bold; text-align: center;"></div>
        <div class="symbol-grid">
          ${SYMBOLS.map(s => `<button class="symbol-button" onclick="selectSymbol('${s}')">${s}</button>`).join('')}
        </div>
        <div style="text-align: center; margin-top: 5px;">
          <button class="button-large" onclick="clearSymbols()">Clear</button>
        </div>
        <p style="text-align: center; color: #999; font-size: 14px; margin-top: 10px;">(Press Enter to submit)</p>
      </div>
    `,
    choices: ['Submit'],
    on_load: () => {
      selectedSymbols = [];
      window.selectSymbol = (symbol) => {
        selectedSymbols.push(symbol);
        document.getElementById('selected-display').textContent = selectedSymbols.join(' ');
      };
      window.clearSymbols = () => {
        selectedSymbols = [];
        document.getElementById('selected-display').textContent = '';
      };
      enableEnterKey(0);
    },
    on_finish: (data) => {
      removeEnterKey();
      data.set_size = setSize;
      data.correct_symbols = setSymbols;
      data.recalled_symbols = selectedSymbols;
      
      // Partial credit scoring
      let score = 0;
      for (let i = 0; i < setSymbols.length; i++) {
        if (selectedSymbols[i] === setSymbols[i]) {
          score++;
        }
      }
      ospanScore += score;
      data.set_score = score;
    }
  });
  
  return trials;
}

// Build main task timeline
const practiceTimeline = {
  timeline: createPracticeSet()
};

// Main task: 2 sets each of lengths 3, 4, 5, 6, 7 = 10 sets total
// Gradual increase: easy to hard, then repeat
const setSizes = [3, 4, 5, 6, 7, 3, 4, 5, 6, 7];

const mainTimeline = {
  timeline: setSizes.map((size, index) => ({
    timeline: [
      {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `<div class="center" style="font-size: 24px; color: #666;">Set ${index + 1} of ${setSizes.length}</div>`,
        choices: "NO_KEYS",
        trial_duration: 800
      },
      ...createMainSet(size)
    ]
  })).flat()
};

// Final screen
const endScreen = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: () => {
    mathAccuracy = totalMathTrials > 0 ? (correctMathTrials / totalMathTrials * 100).toFixed(1) : 0;
    
    const validData = mathAccuracy >= 85;
    
    // Send data to Google Sheets
    fetch('https://script.google.com/macros/s/AKfycbxMsLJ14S5TAZsRSCRXgNlS8caB-SHbnhmjAk8mDj5DE4oKxAfoFCLTIUPDslEUE8kidA/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        prolific_id_from_url: urlProlificID || "N/A",
        prolific_id_entered: prolificID,
        score: ospanScore,
        math_accuracy: mathAccuracy,
        valid_data: validData
      })
    }).catch(error => {
      console.log('Error sending data:', error);
    });
    
    return `
      <div class="final-screen">
        <div class="score-box">
          <p style="font-size: 14px; color: #999; margin-bottom: 5px;">
            Prolific ID: ${prolificID}
          </p>
          <h2 style="margin-top: 0; font-size: 28px; margin-bottom: 15px;">Test Complete!</h2>
          
          <div style="margin: 15px 0;">
            <p style="font-size: 16px; color: #666; margin: 3px 0;">OSPAN Score:</p>
            <div style="font-size: 52px; font-weight: bold; color: #667eea;">
              ${ospanScore}
            </div>
          </div>
          
          <div style="margin: 15px 0; padding: 12px; background: ${validData ? '#d4edda' : '#f8d7da'}; border-radius: 8px;">
            <p style="font-size: 16px; color: #666; margin: 3px 0;">Math Accuracy:</p>
            <p style="font-size: 24px; font-weight: bold; color: ${validData ? '#155724' : '#721c24'}; margin: 3px 0;">
              ${mathAccuracy}%
            </p>
            ${validData ? 
              '<p style="color: #155724; margin: 3px 0;">✓ Valid data</p>' : 
              '<p style="color: #721c24; margin: 3px 0;">⚠ Below 85% threshold</p>'
            }
          </div>
          
          <p style="font-size: 20px; color: #ff6b6b; font-weight: 600; margin-top: 15px; margin-bottom: 8px;">
            ⚠️ Please remember your OSPAN score: ${ospanScore}
          </p>
          <p style="font-size: 16px; color: #666; margin: 5px 0;">
            You will be asked to enter it in the survey.
          </p>
          <p style="font-size: 13px; color: #999; margin-top: 12px;">
            ✓ Data saved automatically
          </p>
        </div>
        <div style="background: rgba(255,255,255,0.2); padding: 15px 25px; border-radius: 10px; margin-top: 15px; border: 2px solid rgba(255,255,255,0.3);">
          <p style="margin: 0; font-size: 20px; font-weight: 600;">
            Close this window to continue the survey
          </p>
        </div>
      </div>
    `;
  },
  choices: "NO_KEYS"
};

// Run experiment
jsPsych.run([prolificEntry, instructions, practiceTimeline, mainTimeline, endScreen]);
</script>
</body>
</html>
